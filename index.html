<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo Mirror v8</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; z-index: 100; border-bottom: 2px solid #00ff00; }
        button { padding: 18px; background: #000; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        button:active { background: #00ff00; color: #000; }
        #status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #000; font-size: 0.9em; border-bottom: 1px solid #333; }
        #videoContainer { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #force-play { position: absolute; padding: 20px; background: #00ff00; color: #000; font-weight: bold; display: none; z-index: 200; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 0 20px #00ff00; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .online { background: #00ff00; box-shadow: 0 0 8px #00ff00; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="startPhone()">1. PHONE MODE</button>
        <button onclick="startHeadset()">2. HEADSET MODE</button>
        <button onclick="toggleVoice()" style="grid-column: span 2;">3. START VOICE LISTENING</button>
        <button onclick="location.reload()" style="grid-column: span 2; color: #ff4444; border-color: #ff4444;">⚠️ HARD RESET</button>
    </div>

    <div id="status-bar">
        <div><span id="led" class="indicator"></span> <span id="status">Ready...</span></div>
        <span id="clock">00:00:00</span>
    </div>

    <div id="videoContainer">
        <button id="force-play" onclick="this.style.display='none'; document.getElementById('videoDisplay').play();">VIDEO RECEIVED! CLICK TO SHOW</button>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

    <script>
        // Use a static ID for the Phone so the Headset always knows where to call
        const PHONE_ID = 'wumbo-mirror-phone-2026'; 
        const peerConfig = { 
            debug: 2,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } 
        };

        let peer, localStream;
        const statusEl = document.getElementById('status');
        const ledEl = document.getElementById('led');
        const video = document.getElementById('videoDisplay');

        // Simple Clock
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
        }, 1000);

        async function startPhone() {
            statusEl.innerText = "Accessing Camera...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = localStream;
                
                peer = new Peer(PHONE_ID, peerConfig);
                
                peer.on('open', () => {
                    statusEl.innerText = "PHONE LIVE - WAITING...";
                    ledEl.classList.add('online');
                });

                peer.on('call', call => {
                    statusEl.innerText = "HEADSET CONNECTED!";
                    call.answer(localStream);
                });

                peer.on('error', err => {
                    if(err.type === 'unavailable-id') statusEl.innerText = "ID Taken! Reloading...";
                    console.error(err);
                });
            } catch (e) { 
                statusEl.innerText = "Camera Error!"; 
                console.error(e);
            }
        }

        function startHeadset() {
            statusEl.innerText = "Connecting...";
            peer = new Peer(peerConfig); 

            peer.on('open', () => {
                statusEl.innerText = "Calling Phone...";
                const call = peer.call(PHONE_ID, new MediaStream()); 
                
                call.on('stream', stream => {
                    statusEl.innerText = "STREAM ATTACHED!";
                    ledEl.classList.add('online');
                    video.srcObject = stream;
                    video.play().catch(() => {
                        document.getElementById('force-play').style.display = 'block';
                    });
                });
            });

            peer.on('error', err => {
                statusEl.innerText = "Link failed. Retrying...";
                setTimeout(startHeadset, 5000);
            });
        }

        function toggleVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                statusEl.innerText = "Voice not supported!";
                return;
            }
            const rec = new Speech();
            rec.continuous = true;
            rec.onstart = () => statusEl.innerText = "LISTENING FOR 'CLIP'...";
            rec.onresult = (e) => {
                const last = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if(last.includes("clip")) {
                   statusEl.innerText = "CLIPPED!";
                   // Add flash or save logic here
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
