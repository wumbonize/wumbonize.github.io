<script>
    // TIP: If you have multiple people using this, add a unique suffix to this ID
    const PHONE_ID = 'wumbo-mirror-phone-2026'; 
    const peerConfig = { 
        debug: 2,
        config: { 'iceServers': [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
        ] } 
    };

    let peer, localStream;
    const video = document.getElementById('videoDisplay');
    const statusEl = document.getElementById('status');
    const forceBtn = document.getElementById('force-play');

    // 1. PHONE MODE: The Broadcaster
    async function startPhone() {
        updateStatus("Requesting Camera...");
        try {
            // Simplified constraints for better mobile compatibility
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "environment", 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 } 
                }, 
                audio: false 
            });
            
            video.srcObject = localStream;
            video.play();

            // Destroy existing peer if it exists to prevent ID collisions
            if (peer) peer.destroy();
            
            peer = new Peer(PHONE_ID, peerConfig);
            
            peer.on('open', (id) => updateStatus(`LIVE: ${id}`, true));
            
            peer.on('call', (call) => {
                updateStatus("HEADSET LINKED!", true);
                call.answer(localStream); // Send phone video to headset
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'unavailable-id') {
                    updateStatus("ID Busy. Resetting...");
                    setTimeout(() => location.reload(), 1500);
                }
            });
        } catch (e) { 
            updateStatus("Camera Denied/Error"); 
            console.error(e);
        }
    }

    // 2. HEADSET MODE: The Receiver
    function startHeadset() {
        updateStatus("Connecting...");
        if (peer) peer.destroy();
        
        peer = new Peer(peerConfig); 

        peer.on('open', (id) => {
            updateStatus("Dialing Phone...");
            // We must send a stream or a placeholder to trigger the 'call' event
            const call = peer.call(PHONE_ID, new MediaStream());
            
            call.on('stream', (remoteStream) => {
                updateStatus("SIGNAL RECEIVED!", true);
                video.srcObject = remoteStream;
                
                // Handling Autoplay restrictions
                const playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => {
                        forceBtn.style.display = 'block';
                    });
                }
            });
        });

        peer.on('error', (err) => {
            updateStatus("Peer Error. Retrying...");
            console.log(err.type);
            setTimeout(startHeadset, 3000);
        });
    }

    // ... Keep your playVideo, takeSnapshot, and toggleVoice functions ...
    
    function updateStatus(msg, isOnline = false) {
        statusEl.innerText = msg;
        const led = document.getElementById('led');
        isOnline ? led.classList.add('online') : led.classList.remove('online');
    }
</script>
