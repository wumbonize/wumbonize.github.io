<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo XR Mirror - Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #videoContainer { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 2px solid #00ff00; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.1s; }
        #warningSign { position: absolute; top: 20%; font-size: 150px; display: none; z-index: 11; animation: blink 0.5s infinite; }
        .controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #000; }
        button { padding: 25px; background: #111; color: #00ff00; border: 2px solid #00ff00; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1em; text-transform: uppercase; }
        button:active { background: #00ff00; color: #000; }
        .full-btn { grid-column: span 2; background: #200; border-color: #f00; color: #f00; }
