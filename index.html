<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo Mirror v8</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; z-index: 100; }
        button { padding: 18px; background: #000; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        #status-bar { display: flex; justify-content: space-between; padding: 10px; background: #000; font-size: 0.9em; border-bottom: 1px solid #333; }
        #videoContainer { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #force-play { position: absolute; padding: 20px; background: #00ff00; color: #000; font-weight: bold; display: none; z-index: 200; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="startPhone()">1. PHONE MODE</button>
        <button onclick="startHeadset()">2. HEADSET MODE</button>
        <button onclick="toggleVoice()" style="grid-column: span 2;">3. START VOICE LISTENING</button>
        <button onclick="location.reload()" style="grid-column: span 2; color: red; border-color: red;">⚠️ HARD RESET</button>
    </div>

    <div id="status-bar">
        <span id="status">Ready...</span>
        <span id="clock">00:00:00</span>
    </div>

    <div id="videoContainer">
        <button id="force-play" onclick="this.style.display='none'; document.getElementById('videoDisplay').play();">VIDEO ARRIVED! CLICK TO SHOW</button>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

    <script>
        // Unique Room ID for just this session
        const ROOM_ID = 'wumbo-room-unique-session-2026';
        const config = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } };

        let peer, localStream;
        const statusEl = document.getElementById('status');
        const video = document.getElementById('videoDisplay');

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function startPhone() {
            statusEl.innerText = "Starting Camera...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = localStream;
                peer = new Peer(ROOM_ID, config);
                peer.on('open', () => statusEl.innerText = "PHONE LIVE - WAITING...");
                peer.on('call', call => {
                    statusEl.innerText = "HEADSET CONNECTED!";
                    call.answer(localStream);
                });
            } catch (e) { statusEl.innerText = "Cam Access Denied!"; }
        }

        function startHeadset() {
            statusEl.innerText = "Attempting Connection...";
            peer = new Peer(config); // Random ID for headset
            peer.on('open', () => {
                const call = peer.call(ROOM_ID, new MediaStream());
                call.on('stream', s => {
                    statusEl.innerText = "STREAM ATTACHED!";
                    video.srcObject = s;
                    // Show force button if autoplay fails
                    video.play().catch(() => document.getElementById('force-play').style.display = 'block');
                });
            });
            // Auto-retry after 5 seconds
            setTimeout(() => { if(!video.srcObject) startHeadset(); }, 5000);
        }

        function toggleVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.continuous = true;
            rec.onstart = () => statusEl.innerText = "LISTENING FOR 'CLIP'...";
            rec.onresult = (e) => {
                if(e.results[e.results.length-1][0].transcript.toLowerCase().includes("clip")) {
                   statusEl.innerText = "CLIPPED!";
                   // Visual flash logic can be added here
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
