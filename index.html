<!DOCTYPE html>
<html>
<head>
    <title>XR Rearview Mirror + Voice Clip</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        video { width: 100vw; height: 70vh; object-fit: cover; transform: scaleX(-1); background: #111; }
        .controls { padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        button { padding: 10px; background: #222; color: #00ff00; border: 1px solid #00ff00; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:active { background: #00ff00; color: #000; }
        #status { font-size: 0.9em; height: 20px; margin-top: 5px; text-transform: uppercase; }
        .listening { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <video id="videoDisplay" autoplay playsinline muted></video>
    <div id="status">System Ready...</div>
    
    <div class="controls">
        <button onclick="startAsPhone()">1. SETUP PHONE (Camera)</button>
        <button onclick="connectAsHeadset()">2. CONNECT HEADSET (Mirror)</button>
        <button onclick="startVoiceRecognition()">3. START VOICE LISTENING</button>
    </div>

    <script>
        let peer;
        let mediaRecorder;
        let chunks = [];
        const videoElement = document.getElementById('videoDisplay');
        const statusEl = document.getElementById('status');

        // --- PEER LOGIC ---
        function startAsPhone() {
            // Hardcoded ID for the phone acts as the "Server"
            peer = new Peer('wumbo-mirror-server'); 
            
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 } }, 
                audio: false 
            }).then(stream => {
                videoElement.srcObject = stream;
                statusEl.innerText = "Phone Broadcasting. Waiting for Headset...";
                
                peer.on('call', (call) => {
                    statusEl.innerText = "Headset Connected!";
                    call.answer(stream); // Send phone video to headset
                });
            }).catch(err => {
                statusEl.innerText = "Camera Error: " + err.message;
            });
        }

        function connectAsHeadset() {
            // Headset gets a random ID to avoid "ID already taken" errors
            peer = new Peer(); 
            
            peer.on('open', (id) => {
                statusEl.innerText = "Searching for Phone...";
                // Call the hardcoded phone ID
                const call = peer.call('wumbo-mirror-server', new MediaStream()); 
                
                call.on('stream', (remoteStream) => {
                    videoElement.srcObject = remoteStream;
                    setupRecorder(remoteStream);
                    statusEl.innerText = "Mirror Active & Buffering...";
                });
            });

            peer.on('error', (err) => {
                statusEl.innerText = "Connection Failed. Is Phone active?";
                console.error(err);
            });
        }

        // --- RECORDING LOGIC ---
        function setupRecorder(stream) {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                if (chunks.length > 0) {
                    const blob = new Blob(chunks, { type: "video/webm" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `clip-${Date.now()}.webm`;
                    a.click();
                    chunks = [];
                }
                mediaRecorder.start(); // Restart instantly
            };
            
            mediaRecorder.start();
            // Automatically cycles every 30 seconds to keep buffer fresh
            setInterval(() => {
                if (mediaRecorder.state === "recording") mediaRecorder.stop();
            }, 30000); 
        }

        function saveCurrentClip() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                statusEl.innerHTML = '<span style="color:white">CLIPPING THAT!</span>';
                mediaRecorder.stop(); 
            }
        }

        // --- VOICE LOGIC (Sshhh... No beeping) ---
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser doesn't support Voice.");

            const recognition = new SpeechRecognition();
            
            // KEY FIX: continuous = true keeps the mic open 
            // without restarting/beeping after every sentence.
            recognition.continuous = true;
            recognition.interimResults = false; 
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                statusEl.innerHTML = '<span class="listening">LISTENING FOR "CLIP THAT"</span>';
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Heard:", transcript);
                if (transcript.includes("clip") || transcript.includes("that")) {
                    saveCurrentClip();
                }
            };

            // Only restart if it actually crashes or stops unexpectedly
            recognition.onend = () => {
                console.log("Voice disconnected. Reconnecting...");
                recognition.start();
            };

            recognition.start();
        }
    </script>
</body>
</html>
