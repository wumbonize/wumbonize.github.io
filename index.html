<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo Mirror v5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; z-index: 100; border-bottom: 2px solid #00ff00; }
        button { padding: 18px; background: #000; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .reset-btn { grid-column: span 2; border-color: #ff0000; color: #ff0000; padding: 10px; }
        #status-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #000; font-size: 0.9em; border-bottom: 1px solid #333; align-items: center; }
        
        #videoContainer { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; }
        
        /* Flashing REC Icon */
        #rec-icon { display: none; width: 12px; height: 12px; background: red; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        #force-play-btn { position: absolute; padding: 20px; background: rgba(0,255,0,0.2); border: 2px solid #00ff00; color: #00ff00; display: none; z-index: 50; cursor: pointer; }
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 60; transition: opacity 0.1s; }
        
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="startPhone()">1. PHONE MODE</button>
        <button onclick="startHeadset()">2. HEADSET MODE</button>
        <button onclick="toggleVoice()">3. VOICE: OFF</button>
        <button class="reset-btn" onclick="location.reload()">⚠️ HARD RESET PAGE</button>
    </div>

    <div id="status-bar">
        <div style="display:flex; align-items:center;">
            <div id="rec-icon"></div>
            <span id="status">Ready. Phone First!</span>
        </div>
        <span id="clock">00:00:00</span>
    </div>

    <div id="videoContainer">
        <div id="flashOverlay"></div>
        <button id="force-play-btn" onclick="manualPlay()">VIDEO DETECTED - CLICK TO SHOW</button>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

    <script>
        let peer;
        let localStream;
        const statusEl = document.getElementById('status');
        const video = document.getElementById('videoDisplay');
        const recIcon = document.getElementById('rec-icon');
        const forceBtn = document.getElementById('force-play-btn');

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function manualPlay() {
            video.play();
            forceBtn.style.display = 'none';
        }

        async function startPhone() {
            statusEl.innerText = "Opening Camera...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = localStream;
                recIcon.style.display = 'block';
                
                if (peer) peer.destroy();
                peer = new Peer('wumbo-xr-mirror-final'); 
                
                peer.on('open', () => statusEl.innerText = "PHONE BROADCASTING...");
                peer.on('call', call => {
                    statusEl.innerText = "HEADSET CONNECTED!";
                    call.answer(localStream);
                });
            } catch (e) {
                statusEl.innerText = "CAM ERROR: No Permissions";
            }
        }

        function startHeadset() {
            statusEl.innerText = "Dialing Phone...";
            if (peer) peer.destroy();
            peer = new Peer(); 
            
            peer.on('open', () => {
                const call = peer.call('wumbo-xr-mirror-final', new MediaStream());
                call.on('stream', s => {
                    statusEl.innerText = "FEED RECEIVED";
                    recIcon.style.display = 'block';
                    video.srcObject = s;
                    
                    // Show force button if autoplay fails
                    video.play().catch(() => {
                        forceBtn.style.display = 'block';
                    });
                });
            });
        }

        function toggleVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Speech not supported");
            const rec = new Speech();
            rec.continuous = true;
            rec.onstart = () => statusEl.innerText = "HEARING FOR 'CLIP'";
            rec.onresult = (e) => {
                const text = e.results[e.results.length-1][0].transcript.toLowerCase();
                if(text.includes("clip")) {
                   document.getElementById('flashOverlay').style.opacity = "1";
                   setTimeout(() => document.getElementById('flashOverlay').style.opacity = "0", 150);
                }
            };
            rec.onend = () => rec.start();
            rec.start();
        }
    </script>
</body>
</html>
