<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo Mirror v6</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; z-index: 100; border-bottom: 2px solid #00ff00; }
        button { padding: 18px; background: #000; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .reset-btn { grid-column: span 2; border-color: #ff0000; color: #ff0000; padding: 10px; }
        #status-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #000; font-size: 0.9em; border-bottom: 1px solid #333; align-items: center; }
        #videoContainer { position: relative; flex: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; }
        #rec-icon { display: none; width: 12px; height: 12px; background: red; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 60; transition: opacity 0.1s; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="startPhone()">1. PHONE MODE</button>
        <button onclick="startHeadset()">2. HEADSET MODE</button>
        <button onclick="toggleVoice()">3. VOICE: OFF</button>
        <button class="reset-btn" onclick="location.reload()">⚠️ HARD RESET</button>
    </div>

    <div id="status-bar">
        <div style="display:flex; align-items:center;"><div id="rec-icon"></div><span id="status">Ready...</span></div>
        <span id="clock">00:00:00</span>
    </div>

    <div id="videoContainer">
        <div id="flashOverlay"></div>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

    <script>
        // THIS CONFIG IS THE FIX: It helps the video find a path through your router
        const peerConfig = {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        let peer;
        let localStream;
        const statusEl = document.getElementById('status');
        const video = document.getElementById('videoDisplay');
        const recIcon = document.getElementById('rec-icon');

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        async function startPhone() {
            statusEl.innerText = "Cam active...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = localStream;
                recIcon.style.display = 'block';
                
                if (peer) peer.destroy();
                peer = new Peer('wumbo-xr-99', peerConfig); 
                
                peer.on('call', call => {
                    statusEl.innerText = "SENDING VIDEO...";
                    call.answer(localStream);
                });
            } catch (e) { statusEl.innerText = "Cam Error!"; }
        }

        function startHeadset() {
            statusEl.innerText = "Dialing...";
            if (peer) peer.destroy();
            peer = new Peer(peerConfig); 
            
            peer.on('open', () => {
                const call = peer.call('wumbo-xr-99', new MediaStream());
                call.on('stream', s => {
                    statusEl.innerText = "MIRROR LIVE";
                    recIcon.style.display = 'block';
                    video.srcObject = s;
                    video.play();
                });
            });
        }

        function toggleVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.continuous = true;
            rec.onresult = (e) => {
                if(e.results[e.results.length-1][0].transcript.toLowerCase().includes("clip")) {
                   document.getElementById('flashOverlay').style.opacity = "1";
                   setTimeout(() => document.getElementById('flashOverlay').style.opacity = "0", 150);
                }
            };
            rec.start();
            statusEl.innerText = "VOICE ACTIVE";
        }
    </script>
</body>
</html>
