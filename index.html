<!DOCTYPE html>
<html>
<head>
    <title>Wumbo XR Mirror</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        #videoContainer { position: relative; width: 100vw; height: 75vh; overflow: hidden; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Flash & Warning Styles */
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 10; }
        #warningSign { position: absolute; top: 20px; right: 20px; font-size: 80px; display: none; z-index: 11; animation: blink 0.5s infinite; }
        
        .controls { padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px; background: #222; color: #00ff00; border: 1px solid #00ff00; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { font-size: 1em; height: 25px; margin: 10px 0; text-transform: uppercase; }
        
        @keyframes blink { 50% { opacity: 0; } }
        .listening { color: #ff0000; animation: blink 1s infinite; }
    </style>
</head>
<body>
    <div id="videoContainer">
        <div id="flashOverlay"></div>
        <div id="warningSign">⚠️</div>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>
    
    <div id="status">Ready...</div>
    
    <div class="controls">
        <button onclick="startAsPhone()">1. SETUP PHONE</button>
        <button onclick="connectAsHeadset()">2. CONNECT HEADSET</button>
        <button onclick="startVoiceRecognition()">3. START VOICE LISTENING</button>
    </div>

    <canvas id="motionCanvas" style="display:none;"></canvas>

    <script>
        let peer;
        let mediaRecorder;
        let chunks = [];
        const video = document.getElementById('videoDisplay');
        const statusEl = document.getElementById('status');
        const flash = document.getElementById('flashOverlay');
        const warning = document.getElementById('warningSign');

        // --- CONNECTION LOGIC ---
        function startAsPhone() {
            if (peer) peer.destroy();
            peer = new Peer('wumbo-mirror-server');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => {
                video.srcObject = stream;
                statusEl.innerText = "Phone Live. Wait for Headset...";
                peer.on('call', call => call.answer(stream));
                startMotionDetection(); // Phone detects the motion
            });
        }

        function connectAsHeadset() {
            if (peer) peer.destroy();
            peer = new Peer();
            peer.on('open', () => {
                statusEl.innerText = "Searching...";
                attemptCall();
            });
            peer.on('error', (err) => {
                if(err.type === 'peer-unavailable') setTimeout(attemptCall, 3000);
            });
        }

        function attemptCall() {
            const call = peer.call('wumbo-mirror-server', new MediaStream());
            call.on('stream', stream => {
                statusEl.innerText = "Connected!";
                video.srcObject = stream;
                setupRecorder(stream);
            });
        }

        // --- CLIPPING & FLASH LOGIC ---
        function setupRecorder(stream) {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: "video/webm" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `clip-${Date.now()}.webm`;
                a.click();
                chunks = [];
                mediaRecorder.start();
            };
            mediaRecorder.start();
            setInterval(() => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
        }

        function triggerFlash() {
            flash.style.opacity = "1";
            setTimeout(() => { flash.style.opacity = "0"; }, 200);
        }
