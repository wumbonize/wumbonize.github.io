<!DOCTYPE html>
<html>
<head>
    <title>Wumbo XR Mirror</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #videoContainer { position: relative; flex-grow: 1; background: #111; overflow: hidden; border-bottom: 2px solid #00ff00; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 10; }
        #warningSign { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; display: none; z-index: 11; animation: blink 0.5s infinite; }
        
        .controls { padding: 20px; background: #000; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 150px; z-index: 20; }
        button { padding: 15px 25px; background: #111; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:active { background: #00ff00; color: #000; }
        
        #status { font-size: 1.2em; padding: 10px; background: #111; border-top: 1px solid #333; }
        
        @keyframes blink { 50% { opacity: 0; } }
        .listening { color: #ff0000; animation: blink 1s infinite; }
    </style>
</head>
<body>
    <div id="videoContainer">
        <div id="flashOverlay"></div>
        <div id="warningSign">⚠️</div>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>
    
    <div id="status">System Ready...</div>
    
    <div class="controls">
        <button onclick="startAsPhone()">1. PHONE (Camera)</button>
        <button onclick="connectAsHeadset()">2. HEADSET (Mirror)</button>
        <button onclick="startVoiceRecognition()">3. VOICE ON</button>
    </div>

    <canvas id="motionCanvas" style="display:none;"></canvas>

    <script>
        let peer;
        let mediaRecorder;
        let chunks = [];
        const video = document.getElementById('videoDisplay');
        const statusEl = document.getElementById('status');
        const flash = document.getElementById('flashOverlay');
        const warning = document.getElementById('warningSign');

        async function startAsPhone() {
            statusEl.innerText = "Requesting Camera...";
            if (peer) peer.destroy();
            peer = new Peer('wumbo-mirror-server');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusEl.innerText = "PHONE LIVE. ID: wumbo-mirror-server";
                peer.on('call', call => {
                    statusEl.innerText = "Headset Connected!";
                    call.answer(stream);
                });
                startMotionDetection();
            } catch (err) {
                statusEl.innerText = "Err: " + err.message;
                alert("Camera failed. Ensure you are on HTTPS and gave permission.");
            }
        }

        function connectAsHeadset() {
            statusEl.innerText = "Initializing Peer...";
            if (peer) peer.destroy();
            peer = new Peer();
            peer.on('open', () => {
                statusEl.innerText = "Searching for Phone...";
                attemptCall();
            });
            peer.on('error', (err) => {
                statusEl.innerText = "Error: " + err.type;
                if(err.type === 'peer-unavailable') setTimeout(attemptCall, 3000);
            });
        }

        function attemptCall() {
            const call = peer.call('wumbo-mirror-server', new MediaStream());
            call.on('stream', stream => {
                statusEl.innerText = "MIRROR ACTIVE";
                video.srcObject = stream;
                setupRecorder(stream);
            });
        }

        function setupRecorder(stream) {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: "video/webm" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `clip-${Date.now()}.webm`;
                a.click();
                chunks = [];
                mediaRecorder.start();
            };
            mediaRecorder.start();
            setInterval(() => { if(mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 30000);
        }

        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice not supported.");
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.onstart = () => statusEl.innerHTML = '<span class="listening">LISTENING FOR "CLIP THAT"</span>';
            recognition.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
                if (text.includes("clip") || text.includes("that")) {
                    flash.style.opacity = "1";
                    setTimeout(() => { flash.style.opacity = "0"; }, 200);
                    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
                }
            };
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        function startMotionDetection() {
            const canvas = document.getElementById('motionCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            let lastFrame;
            setInterval(() => {
                if (!video.srcObject) return;
                canvas.width = 64; canvas.height = 48;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                if (lastFrame) {
                    let diff = 0;
                    for (let i = 0; i < currentFrame.length; i += 4) diff += Math.abs(currentFrame[i] - lastFrame[i]);
                    if (diff > 500000) { 
                        warning.style.display = 'block';
                        setTimeout(() => { warning.style.display = 'none'; }, 2000);
                    }
                }
                lastFrame = currentFrame;
            }, 500);
        }
    </script>
</body>
</html>
