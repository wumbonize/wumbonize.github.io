<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wumbo XR Mirror</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Buttons at the TOP so they don't get cut off */
        .controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; z-index: 100; border-bottom: 2px solid #00ff00; }
        button { padding: 15px; background: #000; color: #00ff00; border: 2px solid #00ff00; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        button:active { background: #00ff00; color: #000; }
        .reset-btn { grid-column: span 2; border-color: #ff0000; color: #ff0000; padding: 10px; }

        #status-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #000; font-size: 0.9em; border-bottom: 1px solid #333; }
        
        #videoContainer { position: relative; flex: 1; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #flashOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 10; }
        #warningSign { position: absolute; top: 10%; font-size: 100px; display: none; z-index: 11; animation: blink 0.5s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="startPhone()">1. PHONE MODE</button>
        <button onclick="startHeadset()">2. HEADSET MODE</button>
        <button onclick="toggleVoice()">3. VOICE: OFF</button>
        <button class="reset-btn" onclick="location.reload()">⚠️ RESET PAGE</button>
    </div>

    <div id="status-bar">
        <span id="status">Ready...</span>
        <span id="clock">00:00:00</span>
    </div>

    <div id="videoContainer">
        <div id="flashOverlay"></div>
        <div id="warningSign">⚠️</div>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

    <script>
        let peer;
        const statusEl = document.getElementById('status');
        const video = document.getElementById('videoDisplay');

        // Clock Function
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        async function startPhone() {
            statusEl.innerText = "Cam active...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                peer = new Peer('wumbo-shared-room'); 
                peer.on('open', () => statusEl.innerText = "PHONE ONLINE");
                peer.on('call', call => call.answer(stream));
            } catch (e) { statusEl.innerText = "Cam Error!"; }
        }

        function startHeadset() {
            statusEl.innerText = "Connecting...";
            peer = new Peer(); 
            peer.on('open', () => {
                const call = peer.call('wumbo-shared-room', new MediaStream());
                call.on('stream', s => {
                    video.srcObject = s;
                    statusEl.innerText = "CONNECTED";
                });
            });
        }

        function toggleVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.continuous = true;
            rec.onstart = () => statusEl.innerText = "LISTENING...";
            rec.onresult = (e) => {
                const text = e.results[e.results.length-1][0].transcript.toLowerCase();
                if(text.includes("clip")) {
                   document.getElementById('flashOverlay').style.opacity = "1";
                   setTimeout(() => document.getElementById('flashOverlay').style.opacity = "0", 200);
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
